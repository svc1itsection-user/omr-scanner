<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DepEd OMR Computer Vision Scanner</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #1e1e24; color: #fff; padding: 20px; text-align: center; }
    .video-container { position: relative; max-width: 500px; margin: 0 auto; }
    #videoView, #canvasOutput { width: 100%; max-width: 500px; border-radius: 8px; border: 3px solid #0dcaf0; }
    #canvasOutput { position: absolute; top: 0; left: 0; opacity: 0.6; pointer-events: none; }
    .status-panel { max-width: 500px; margin: 20px auto; background: #2b2b36; padding: 20px; border-radius: 10px; }
  </style>
  <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript" onload="onOpenCvReady()"></script>
</head>
<body>

  <div class="container">
    <h2 class="mt-3 text-info fw-bold">DepEd Automated OMR Scanner</h2>
    <p id="opencvStatus" class="text-warning">Loading Computer Vision Engine (OpenCV.js)...</p>

    <div class="video-container shadow">
      <video id="videoView" autoplay playsinline muted></video>
      <canvas id="canvasOutput"></canvas>
    </div>
    
    <div class="status-panel shadow text-start">
      <h5 class="text-success fw-bold">Scan Results Terminal</h5>
      <hr class="bg-secondary">
      <p><strong>Detected LRN / Student:</strong> <span id="detectedId" class="text-white">Scanning...</span></p>
      <p><strong>Auto-Calculated Score:</strong> <span id="detectedScore" class="text-info fs-4 fw-bold">0</span> / <span id="totalItems">20</span></p>
      <button id="submitBtn" onclick="sendDataToGoogleSheets()" class="btn btn-lg btn-success w-100 fw-bold d-none">CONFIRM & SAVE TO SHEET</button>
    </div>
  </div>

  <script>
    let video = document.getElementById('videoView');
    let canvasOutput = document.getElementById('canvasOutput');
    let ctx = canvasOutput.getContext('2d');
    let src, dst, cap;
    let streamActive = false;

    // 1. Initialize Camera Feed
    function startCamera() {
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 640, height: 480 } })
        .then(function(stream) {
          video.srcObject = stream;
          video.play();
          streamActive = true;
        })
        .catch(function(err) {
          alert("Camera Error: Enable device access permissions.");
        });
    }

    // 2. Triggered when OpenCV.js finishes downloading to browser
    function onOpenCvReady() {
      document.getElementById('opencvStatus').innerText = "CV Engine Online. Ready to scan!";
      document.getElementById('opencvStatus').className = "text-success fw-bold";
      startCamera();
      
      // Delay initialization slightly to let video settle
      setTimeout(() => {
        if(streamActive) {
          src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
          dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC1);
          cap = new cv.VideoCapture(video);
          canvasOutput.width = video.videoWidth;
          canvasOutput.height = video.videoHeight;
          requestAnimationFrame(processVideoFrame);
        }
      }, 2000);
    }

    // 3. Real-Time Frame Processing Loop
    function processVideoFrame() {
      if (!streamActive) return;
      
      try {
        cap.read(src);
        cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
        // Apply adaptive thresholding to expose dark shaded bubbles distinctly
        cv.adaptiveThreshold(dst, dst, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 11, 2);

        let contours = new cv.MatVector();
        let hierarchy = new cv.Mat();
        cv.findContours(dst, contours, hierarchy, cv.RETR_CCOMP, cv.CHAIN_APPROX_SIMPLE);

        let bubbleCount = 0;
        ctx.clearRect(0, 0, canvasOutput.width, canvasOutput.height);

        // Analyze contours found in frame
        for (let i = 0; i < contours.size(); ++i) {
          let cnt = contours.get(i);
          let rect = cv.boundingRect(cnt);
          let aspectRatio = rect.width / rect.height;

          // Computer Vision Filter: Is the shape roughly circular and sized like a bubble?
          if (rect.width >= 12 && rect.width <= 28 && aspectRatio >= 0.8 && aspectRatio <= 1.2) {
            bubbleCount++;
            // Draw visual tracking boxes over detected sheet bubbles on the teacher's UI
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 2;
            ctx.strokeRect(rect.x, rect.y, rect.width, rect.height);
          }
        }

        // --- SIMULATED GRADING TRIGGER MECHANISM ---
        // Once the frame captures the critical mass threshold layout structure (e.g., 20+ bubbles aligned)
        if (bubbleCount >= 20) {
          document.getElementById('detectedId').innerText = "LRN-20260901"; 
          document.getElementById('detectedScore').innerText = "19"; // Sample parsed calculation
          document.getElementById('submitBtn').classList.remove('d-none'); // Show confirmation button
        }

        contours.delete(); hierarchy.delete();
        requestAnimationFrame(processVideoFrame);
      } catch (err) {
        console.log("Frame drop caught: ", err);
        requestAnimationFrame(processVideoFrame);
      }
    }

    // 4. Send Automatically Read Data to Google Sheets Backend
    function sendDataToGoogleSheets() {
      const googleWebAppUrl = "https://script.google.com/macros/s/AKfycbxm2aY5dnxU7phLYqwDUm80cWgzZ5_YvhBCKvMVaTGkhf79wRCHwURaaW6dDekkWI9I/exec";
      
      let payload = {
        studentId: document.getElementById('detectedId').innerText,
        score: parseInt(document.getElementById('detectedScore').innerText),
        totalItems: parseInt(document.getElementById('totalItems').innerText)
      };

      fetch(googleWebAppUrl, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      })
      .then(res => res.json())
      .then(data => {
        if (data.status === "success") {
          alert(`Success! Auto-graded score logged for ${payload.studentId}`);
          document.getElementById('submitBtn').classList.add('d-none');
        }
      })
      .catch(err => alert("Transmission Error. Check connection parameters."));
    }
  </script>
</body>
</html>
