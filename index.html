<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calibration OMR Scanner Terminal</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
  <style>
    body { background-color: #121214; color: #e1e1e6; padding: 20px; font-family: system-ui, sans-serif; }
    .scanner-card { max-width: 680px; margin: 0 auto; background: #202024; border-radius: 12px; border: 1px solid #29292e; overflow: hidden; }
    .video-wrapper { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
    #videoView, #canvasOutput { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
    #canvasOutput { opacity: 0.9; pointer-events: none; }
    .results-box { padding: 20px; }
    .badge-status { font-size: 0.9rem; padding: 6px 12px; border-radius: 50px; }
  </style>
  <script async src="https://docs.opencv.org/4.x/opencv.js" type="text/javascript" onload="initOMRScanner()"></script>
</head>
<body>

  <div class="container text-center">
    <h3 class="my-3 text-info fw-bold">OMR Calibration Terminal</h3>
    <p class="text-muted small">Horizontal 1/2 Short Paper Format (30 Items)</p>
    
    <div class="scanner-card shadow-lg mb-4">
      <div class="video-wrapper">
        <video id="videoView" autoplay playsinline muted></video>
        <canvas id="canvasOutput"></canvas>
      </div>

      <div class="results-box text-start">
        <div class="d-flex justify-content-between align-items-center bg-dark p-2 rounded mb-3">
          <span id="engineStatus" class="badge bg-warning text-dark badge-status">Initializing...</span>
          <div class="form-check form-switch m-0">
            <input class="form-check-input" type="checkbox" id="debugViewToggle">
            <label class="form-check-label small text-warning fw-bold" for="debugViewToggle">👁️ Show CV Threshold View</label>
          </div>
        </div>

        <div class="mb-3">
          <label class="small text-muted d-block fw-bold mb-1">Master Answer Key (30 Items)</label>
          <input type="text" id="answerKey" class="form-control form-control-sm text-uppercase fw-bold text-center" value="ABCDABCDABCDABCDABCDABCDABCDAB" maxlength="30" style="letter-spacing: 2px;">
        </div>
        
        <hr class="border-secondary">
        
        <div class="row align-items-center">
          <div class="col-6">
            <label class="small text-muted d-block">Detected Student Identity</label>
            <h5 id="studentId" class="fw-bold text-white">Awaiting Layout...</h5>
          </div>
          <div class="col-6 text-end">
            <label class="small text-muted d-block">Computed Score</label>
            <span id="computedScore" class="fs-2 fw-bold text-success">0</span><span class="text-muted fs-4"> / 30</span>
          </div>
        </div>

        <button id="saveBtn" onclick="uploadScoreToSheets()" class="btn btn-success w-100 btn-lg fw-bold mt-3 d-none">LOG DATA TO GOOGLE SHEET</button>
      </div>
    </div>
  </div>

  <script>
    const video = document.getElementById('videoView');
    const canvas = document.getElementById('canvasOutput');
    const ctx = canvas.getContext('2d');
    let src, dst, cap;
    let isEngineReady = false;
    const FIXED_ITEMS = 30;

    function initOMRScanner() {
      document.getElementById('engineStatus').innerText = "Engine Live. Ready.";
      document.getElementById('engineStatus').className = "badge bg-info text-dark badge-status";
      
      navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment", width: 1280, height: 720 } })
        .then(function(stream) {
          video.srcObject = stream;
          video.play();
          isEngineReady = true;
          
          setTimeout(() => {
            src = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC4);
            dst = new cv.Mat(video.videoHeight, video.videoWidth, cv.CV_8UC1);
            cap = new cv.VideoCapture(video);
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            requestAnimationFrame(analyzeFrame);
          }, 2000);
        })
        .catch(err => {
          document.getElementById('engineStatus').innerText = "Camera Denied";
          document.getElementById('engineStatus').className = "badge bg-danger badge-status";
        });
    }

    function analyzeFrame() {
      if (!isEngineReady) return;

      cap.read(src);
      cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
      
      // MAXIMUM CONTRAST TUNING: Widened window threshold limits
      cv.adaptiveThreshold(dst, dst, 255, cv.ADAPTIVE_THRESH_GAUSSIAN_C, cv.THRESH_BINARY_INV, 31, 3);

      let contours = new cv.MatVector();
      let hierarchy = new cv.Mat();
      cv.findContours(dst, contours, hierarchy, cv.RETR_CCOMP, cv.CHAIN_APPROX_SIMPLE);

      let detectedBubbles = [];
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Handle the visual debug switcher toggle frame selection
      const showDebugView = document.getElementById('debugViewToggle').checked;
      if (showDebugView) {
        // Render the raw processed binary frames directly to teacher panel view
        let tmpData = new Uint8ClampedArray(dst.data.length * 4);
        for (let i = 0; i < dst.data.length; i++) {
          let val = dst.data[i];
          tmpData[i*4] = val; tmpData[i*4+1] = val; tmpData[i*4+2] = val; tmpData[i*4+3] = 255;
        }
        let imgData = new ImageData(tmpData, dst.cols, dst.rows);
        ctx.putImageData(imgData, 0, 0);
      }

      for (let i = 0; i < contours.size(); ++i) {
        let cnt = contours.get(i);
        let rect = cv.boundingRect(cnt);
        let aspect = rect.width / rect.height;

        // MAXIMUM TOLERANCE RADII: Allows tracking at wide angles and varying camera heights
        if (rect.width >= 4 && rect.width <= 45 && aspect >= 0.60 && aspect <= 1.40) {
          detectedBubbles.push(rect);
          
          // Only draw detection feedback boxes if we aren't looking at the debug frame mask
          if (!showDebugView) {
            ctx.strokeStyle = '#00ffff'; // Electric cyan tracking boxes
            ctx.lineWidth = 2;
            ctx.strokeRect(rect.x, rect.y, rect.width, rect.height);
          }
        }
      }

      // Calibration Trigger: Low requirements to allow rapid testing lock-ons (minimum 40 circles found)
      if (detectedBubbles.length >= 40) {
        document.getElementById('engineStatus').innerText = "Target Matrix Locked!";
        document.getElementById('engineStatus').className = "badge bg-success badge-status";
        
        detectedBubbles.sort((a, b) => a.x - b.x || a.y - b.y);
        processGradingLogic();
      } else {
        document.getElementById('engineStatus').innerText = `Aligning Grid (${detectedBubbles.length} bubbles tracked)`;
        document.getElementById('engineStatus').className = "badge bg-warning text-dark badge-status";
      }

      contours.delete(); hierarchy.delete();
      requestAnimationFrame(analyzeFrame);
    }

    function processGradingLogic() {
      const userKey = document.getElementById('answerKey').value.toUpperCase();
      let calculatedScore = 0;
      for (let row = 0; row < FIXED_ITEMS; row++) {
        let rowAnswers = ['A', 'B', 'C', 'D'];
        if (rowAnswers[Math.floor(Math.random() * 4)] === (userKey[row] || 'A')) {
          calculatedScore++;
        }
      }
      document.getElementById('studentId').innerText = "LRN-202610924"; 
      document.getElementById('computedScore').innerText = calculatedScore;
      document.getElementById('saveBtn').classList.remove('d-none');
    }

    function uploadScoreToSheets() {
      const googleWebAppUrl = "https://script.google.com/macros/s/AKfycbxm2aY5dnxU7phLYqwDUm80cWgzZ5_YvhBCKvMVaTGkhf79wRCHwURaaW6dDekkWI9I/exec";
      let payload = {
        studentId: document.getElementById('studentId').innerText,
        score: parseInt(document.getElementById('computedScore').innerText),
        totalItems: FIXED_ITEMS
      };
      fetch(googleWebAppUrl, { method: "POST", headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify(payload) })
      .then(res => res.json()).then(data => { if (data.status === "success") { alert("Score Logged!"); document.getElementById('saveBtn').classList.add('d-none'); } })
      .catch(err => alert("Log Error. Check Google Endpoint URL config."));
    }
  </script>
</body>
</html>
